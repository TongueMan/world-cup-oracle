agent_weights:
  data_analyst: 0.35
  tactical_analyst: 0.20
  narrative_agent: 0.15
  tarot_agent: 0.10
  iching_agent: 0.10
  astrology_agent: 0.10

consensus_types:
  strong_consensus:
    condition: "三轨支持同一方"
    confidence_delta: 0.05
    upset_index_delta: 0.0
  rational_lead:
    condition: "理性轨支持一方，其他轨无强烈反对"
    confidence_delta: 0.0
    upset_index_delta: 0.0
  rational_lead_with_symbolic_warning:
    condition: "理性轨支持强队，象征轨提示险局"
    confidence_delta: -0.05
    upset_index_delta: 0.15
  narrative_dark_horse_warning:
    condition: "叙事轨强烈支持低排名球队"
    confidence_delta: -0.03
    upset_index_delta: 0.10
  multi_track_split:
    condition: "三轨明显分裂"
    confidence_delta: -0.10
    upset_index_delta: 0.20

constraints:
  symbolic_cannot_override_high_confidence_rational: true
  min_opinions_per_debate: 2
  high_confidence_threshold: 0.70
