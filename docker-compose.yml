name: worldcup-oracle

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${WCPA_POSTGRES_DB:-wcpa}
      POSTGRES_USER: ${WCPA_POSTGRES_USER:-postgre}
      POSTGRES_PASSWORD: ${WCPA_POSTGRES_PASSWORD:-postgre}
    ports:
      - "${WCPA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WCPA_POSTGRES_USER:-postgre} -d ${WCPA_POSTGRES_DB:-wcpa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      WCPA_DATABASE_URL: postgresql://${WCPA_POSTGRES_USER:-postgre}:${WCPA_POSTGRES_PASSWORD:-postgre}@postgres:5432/${WCPA_POSTGRES_DB:-wcpa}
      WCPA_ENABLE_WEB_COLLECTORS: "true"
      WCPA_BING_SCHEDULE_URL: ${WCPA_BING_SCHEDULE_URL:-}
      WCPA_ENABLE_LLM_AGENTS: "true"
      WCPA_LLM_BASE_URL: ${WCPA_LLM_BASE_URL:-https://api.deepseek.com}
      WCPA_LLM_MODEL: ${WCPA_LLM_MODEL:-deepseek-chat}
      WCPA_LLM_API_KEY_FILE: /run/secrets/llm_api_key
      WCPA_WEB_SEARCH_ENABLED: ${WCPA_WEB_SEARCH_ENABLED:-true}
      WCPA_SEARCH_PROVIDER: ${WCPA_SEARCH_PROVIDER:-firecrawl}
      WCPA_FIRECRAWL_API_KEY_FILE: /run/secrets/firecrawl_api_key
      WCPA_API_FOOTBALL_API_KEY: ${WCPA_API_FOOTBALL_API_KEY:-}
      WCPA_API_FOOTBALL_ODDS_ENABLED: ${WCPA_API_FOOTBALL_ODDS_ENABLED:-true}
    secrets:
      - llm_api_key
      - firecrawl_api_key
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:

secrets:
  llm_api_key:
    environment: WCPA_LLM_API_KEY
  firecrawl_api_key:
    environment: WCPA_FIRECRAWL_API_KEY
